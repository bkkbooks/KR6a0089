body:
  text: 宋居士沮渠京聲譯聞如是一時婆伽婆在舍衛城祇樹給孤獨園爾時世尊告諸比丘我今當說聖八關齊諦聽諦聽善思念之我今當說對曰如是世尊爾時彼比丘從佛受教世尊告曰於是比丘若信族姓子族姓女欲知聖八關齊便教某甲當作是說猶如阿羅漢盡形壽不殺生亦不教人殺生無怨恨心當懷慚愧有慈心愍一切衆生我字某名某為阿羅漢所教自今日始隨意所欲不復殺生無怨恨心常懷慚愧有慈心愍一切衆生猶如阿羅漢盡形壽不盜好施亦不教人盜常樂間處如是我字某名某為阿羅漢所教隨意所欲不復盜竊常懷惠施樂間居處猶如阿羅漢盡形壽不習不淨行常修梵行清淨無穢而自娛樂如是我字某名某為阿羅漢所教自今已後不復淫妷清淨無穢猶如阿羅漢盡形壽不妄語常行審諦最尊最貴諸尊長為世所貴如是我字某名某為彼阿羅漢所教自今已後更不復妄語亦不教人使習妄語當行審諦為世尊長不行妄語猶如阿羅漢亦不飲酒如是我字某名某自今已後隨意所欲亦不飲酒亦不教人使飲酒猶如阿羅漢盡形壽不犯齊隨時食如是我字某名某今一日一夜隨意所欲亦不犯齊亦不教人使犯齊隨時食猶如阿羅漢盡形壽不於高好床坐如是我字某名某今一日一夜不於高廣床坐亦不教人使坐猶如阿羅漢盡形壽不習歌舞戲樂亦不著紋飾香熏塗身今一日一夜不習歌舞戲樂亦不著紋飾香熏塗身如是修行聖八關齊於是八關齊中功德不可限量言有爾所福爾所功德爾所福報如是衆多福不可稱計諸比丘譬如五大流水皆同一處所謂恆伽謠婆奴新頭阿脂耶婆提摩棄彼水所流處不可限量言有爾所水有爾所瓶水有爾所千瓶百千瓶水如是聖八關齊福不可稱量言有爾所福爾所功德爾所果報此大福不可稱計爾時諸比丘聞佛所說歡喜奉行
